    <header class="hero-section">
        <div class="hero-container">
            <h1>FULL INSCRIPCIO</span></h1>
            <p style="margin-top: 15px; font-weight: 600;">APUNTAT.</p>
        </div>
    </header>

    <main class="content-wrapper">
        <div class="grid-2-cols">
            </div>

            <div class="espacio-section">
                <h2 class="font-head">APUNTAT A UNA <span class="text-sky">ACTIVITAT</span></h2>
                <h3 style="margin-bottom: 25px; font-size: 11px; letter-spacing: 2px;">APUNTAT</h3>
                
                <form class="cyan-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <input type="text" placeholder="NOM I COGNOMS" required>
                        <input type="tel" placeholder="TELÈFON">
                    </div>
                    
                    <input type="email" placeholder="CORREU ELECTRÒNIC" required style="margin-top: 15px;">
                    
                    <select style="margin-top: 15px;">
                        <option value="" disabled selected>INTERESSAT EN...</option>
                        <option value="activitats">Activitat “Adopta amb Coneixement”</option>
                        <option value="activitats">Activitat Educativa “Respectem els Animals”</option>
                         <option value="activitats">Activitat Educativa “Mans que Ajuden”</option>
                        <option value="activitats">Activitat Educativa “Coneix el Refugi”</option>
                        <option value="activitats">Ruta Solidaria “Caminata con Patas”</option>
                        <option value="activitats">Activitat solidaria "Guardians de l'habitat"</option>
                        <option value="tallers">Taller 1: “Emocions i Animals”</option>
                         <option value="tallers">Taller 2: “Refugi en Acció”</option>
                         <option value="tallers">Taller 3: “Petjades Verdes”</option>
                        <option value="campus">Campus 1: “Natura Viva”</option>
                        <option value="campus">Campus 2: “Planeta Actiu”</option>
                    </select>

                    <textarea placeholder="EL TEU MISSATGE" style="margin-top: 15px;" required></textarea>
                    
                    <div style="margin: 15px 0; display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="privacy" required style="width: auto;">
                        <label for="privacy" style="font-size: 12px; color: var(--ink);">Accepto la política de privacitat</label>
                    </div>

                    <button type="submit" style="width: 100%;">apuntar-me</button>
                </form>
            </div>
        </div>
    </main>
